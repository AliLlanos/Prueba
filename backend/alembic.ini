# 🗄️ ERP Professional - Configuración de Alembic
# =================================================
# 
# Configuración para migraciones de base de datos con Alembic.
# Alembic es la herramienta de migración de SQLAlchemy que permite
# versionar y aplicar cambios en el esquema de base de datos.

[alembic]
# Ruta del directorio de migraciones
script_location = alembic

# Plantilla de archivo de migración
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Configuración de timezone para timestamps
timezone = UTC

# Truncar cadenas largas en el output
truncate_slug_length = 40

# Revisión de base (primer migración)
# Puede ser usada por 'autogenerate' para comparar contra el esquema actual
# revision_environment = false

# ============================================================================
# 🔧 CONFIGURACIÓN DE SQLALCHEMY
# ============================================================================

# URL de la base de datos - se lee desde variable de entorno
# sqlalchemy.url = driver://user:pass@localhost/dbname
sqlalchemy.url = postgresql://erp_user:erp_password_2024@localhost:5432/erp_professional

# Configuración adicional de SQLAlchemy
[post_write_hooks]
# Hook para formatear código Python generado (usando black)
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = -l 88 REVISION_SCRIPT_FILENAME

# ============================================================================
# 📝 CONFIGURACIÓN DE LOGGING
# ============================================================================

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# ============================================================================
# 📋 NOTAS DE USO
# ============================================================================
#
# Comandos útiles de Alembic:
#
# Crear nueva migración automática:
#   alembic revision --autogenerate -m "Descripción del cambio"
#
# Crear migración manual:
#   alembic revision -m "Descripción del cambio"
#
# Aplicar migraciones:
#   alembic upgrade head
#
# Ver historial de migraciones:
#   alembic history
#
# Ver migración actual:
#   alembic current
#
# Revertir una migración:
#   alembic downgrade -1
#
# Aplicar migración específica:
#   alembic upgrade <revision_id>
#
# Generar SQL sin aplicar:
#   alembic upgrade head --sql